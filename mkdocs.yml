          - Evaluators: core-components/evaluation/evaluators.zh.md
          - Evaluation reports: core-components/evaluation/evaluation-reports.zh.md
          - Benchmarks:
              - MultiHop-RAG: core-components/evaluation/multihop-rag.zh.md
